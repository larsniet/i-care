name: Deploy to App Store

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Upload to App Store Connect
    runs-on: macos-15
    timeout-minutes: 45

    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying version: $TAG"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure SSH for Match
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MATCH_DEPLOY_KEY }}" | base64 --decode > ~/.ssh/match_deploy_key
          chmod 600 ~/.ssh/match_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host github.com\n  IdentityFile ~/.ssh/match_deploy_key\n  IdentitiesOnly yes\n' >> ~/.ssh/config

      - name: Set MATCH_REPO
        run: echo "MATCH_REPO=${{ secrets.MATCH_REPO }}" | tr -d '\n\r' >> "$GITHUB_ENV"

      - name: Create CI keychain
        env:
          KEYCHAIN_PASSWORD: ci_build_temp
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" ci_build.keychain
          security default-keychain -s ci_build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" ci_build.keychain
          security set-keychain-settings -t 3600 -u ci_build.keychain
          echo "MATCH_KEYCHAIN_NAME=ci_build.keychain" >> "$GITHUB_ENV"
          echo "MATCH_KEYCHAIN_PASSWORD=ci_build_temp" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        run: |
          if command -v xcodegen &>/dev/null; then
            xcodegen generate
          else
            brew install xcodegen
            xcodegen generate
          fi

      - name: Build and deploy
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: bundle exec fastlane release
