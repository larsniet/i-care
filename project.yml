name: iCare
options:
  bundleIdPrefix: com.icareeye
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: targeted
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 3BGHPQ6C3H

targets:
  iCare:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - path: iCare
        excludes:
          - "**/*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.icareeye.app
        INFOPLIST_FILE: iCare/Info.plist
        CODE_SIGN_ENTITLEMENTS: iCare/iCare.entitlements
        PRODUCT_NAME: iCare
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
    dependencies:
      - target: iCareWatch

  iCareWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    sources:
      - path: iCareWatch
        excludes:
          - "**/*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.icareeye.app.watchkitapp
        INFOPLIST_FILE: iCareWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: iCareWatch/iCareWatch.entitlements
        PRODUCT_NAME: iCareWatch
        GENERATE_INFOPLIST_FILE: false
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: "4"
